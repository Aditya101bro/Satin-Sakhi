name: satin_sakhi
description: Satin Sakhi - KYC Document Capture with on-device AI guidance
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5+9
google_mlkit_face_detection: ^0.11.1
google_mlkit_text_recognition: ^0.11.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  vibration: ^2.0.0

flutter:
  assets:
    - assets/audio/
  fonts:
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf
