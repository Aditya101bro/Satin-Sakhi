name: Build Satin Sakhi APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install gtts && python generate_audio.py
      - name: Regenerate Android project
        run: |
          rm -rf android
          flutter create --platforms=android --org com.satincreditcare .
          sed -i '/<application/i\    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.VIBRATE"/>' android/app/src/main/AndroidManifest.xml
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' android/app/build.gradle.kts
          sed -i 's/ndkVersion = flutter.ndkVersion/ndkVersion = "27.0.12077973"/' android/app/build.gradle.kts
      - run: flutter pub get
      - run: flutter build apk --release --no-shrink
      - uses: actions/upload-artifact@v4
        with:
          name: satin-sakhi-apk
          path: build/app/outputs/flutter-apk/app-release.apk
